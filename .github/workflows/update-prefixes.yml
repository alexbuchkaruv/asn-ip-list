name: Update IP Prefixes

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Resolve ASNs to prefixes
        run: |
          rm -f prefixes.txt
          touch prefixes.txt
          while IFS= read -r asn; do
            echo "# AS${asn}" >> prefixes.txt
            curl -s "https://api.bgpview.io/asn/${asn}/prefixes" | jq -r '.data.ipv4_prefixes[].prefix' >> prefixes.txt
            sleep 2
          done < asn-list.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add prefixes.txt
          git diff --cached --quiet || git commit -m "Auto-update prefixes"
          git push
